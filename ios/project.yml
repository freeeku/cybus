# xcodegen project spec — run `xcodegen generate` in the ios/ directory.
# Install: brew install xcodegen

name: Cybus
options:
  bundleIdPrefix: com.cybus
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_STRICT_CONCURRENCY: complete

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.29.0"
  SwiftProtobuf:
    url: https://github.com/apple/swift-protobuf
    from: "1.28.0"

targets:
  Cybus:
    type: application
    platform: iOS
    sources:
      - Cybus
    dependencies:
      - package: GRDB
        product: GRDB
      - package: SwiftProtobuf
        product: SwiftProtobuf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cybus.app
        INFOPLIST_FILE: Cybus/Resources/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""   # fill in your Apple Developer Team ID

  CybusTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CybusTests
    dependencies:
      - target: Cybus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cybus.tests
