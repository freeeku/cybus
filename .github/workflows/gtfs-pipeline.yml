name: Build & Publish Static GTFS

on:
  schedule:
    # Run daily at 03:00 UTC (early morning Cyprus time — low traffic)
    - cron: "0 3 * * *"
  workflow_dispatch:         # Allow manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Needed to push to gh-pages (if using GitHub Pages as host)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Build GTFS SQLite
        run: |
          python pipeline/build_gtfs.py \
            --out-dir dist/ \
            --public-url "${{ vars.STATIC_SQLITE_URL }}"

      - name: Verify output files exist
        run: |
          test -f dist/gtfs.sqlite || (echo "ERROR: gtfs.sqlite not found" && exit 1)
          test -f dist/manifest.json || (echo "ERROR: manifest.json not found" && exit 1)
          echo "SQLite size: $(du -sh dist/gtfs.sqlite | cut -f1)"
          echo "Manifest:"
          cat dist/manifest.json

      # ── Option A: Publish to GitHub Pages ──────────────────────────────────
      # Uncomment this block and configure the repository for GitHub Pages
      # (Settings → Pages → Source: GitHub Actions).
      #
      # - name: Deploy to GitHub Pages
      #   uses: peaceiris/actions-gh-pages@v4
      #   with:
      #     github_token: ${{ secrets.GITHUB_TOKEN }}
      #     publish_dir: dist/
      #     destination_dir: cybus/
      #     keep_files: false

      # ── Option B: Upload to Cloudflare R2 ─────────────────────────────────
      # Set CLOUDFLARE_ACCOUNT_ID, CLOUDFLARE_R2_BUCKET, and R2_ACCESS_KEY_ID /
      # R2_SECRET_ACCESS_KEY in repository secrets. Install wrangler.
      #
      # - name: Upload to Cloudflare R2
      #   env:
      #     CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      #     AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      #     AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      #   run: |
      #     npx wrangler r2 object put "${{ secrets.CLOUDFLARE_R2_BUCKET }}/cybus/gtfs.sqlite" \
      #       --file dist/gtfs.sqlite --content-type application/octet-stream
      #     npx wrangler r2 object put "${{ secrets.CLOUDFLARE_R2_BUCKET }}/cybus/manifest.json" \
      #       --file dist/manifest.json --content-type application/json

      - name: Upload dist/ as artifact (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: gtfs-dist
          path: dist/
          retention-days: 7
