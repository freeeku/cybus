name: Build & Publish Static GTFS

on:
  schedule:
    # Run daily at 03:00 UTC (early morning Cyprus time — low traffic)
    - cron: "0 3 * * *"
  workflow_dispatch:         # Allow manual triggering

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # Needed to push to gh-pages (if using GitHub Pages as host)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Build GTFS SQLite
        run: |
          python pipeline/build_gtfs.py \
            --out-dir dist/ \
            --public-url "${{ vars.STATIC_SQLITE_URL }}"

      - name: Verify output files exist
        run: |
          test -f dist/gtfs.sqlite || (echo "ERROR: gtfs.sqlite not found" && exit 1)
          test -f dist/manifest.json || (echo "ERROR: manifest.json not found" && exit 1)
          echo "SQLite size: $(du -sh dist/gtfs.sqlite | cut -f1)"
          echo "Manifest:"
          cat dist/manifest.json

      # ── Publish to GitHub Pages ────────────────────────────────────────────
      # Publishes dist/ to the gh-pages branch root, so the files are served at:
      #   https://<user>.github.io/<repo>/gtfs.sqlite
      #   https://<user>.github.io/<repo>/manifest.json
      # One-time setup: Settings → Pages → Source: "Deploy from a branch",
      # Branch: gh-pages / root. See docs/deploy.md.
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist/
          keep_files: false

      - name: Upload dist/ as artifact (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: gtfs-dist
          path: dist/
          retention-days: 7
